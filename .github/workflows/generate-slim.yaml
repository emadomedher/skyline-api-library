name: Generate profiles-slim.json

on:
  push:
    branches: [main]
    paths:
      - 'profiles.json'

jobs:
  generate-slim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate slim index
        run: node scripts/generate-slim.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profiles-slim.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: regenerate profiles-slim.json [skip ci]"
          git push
